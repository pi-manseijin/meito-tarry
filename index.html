<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>タリーシート</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 12px;
}

h1 {
  text-align: center;
}

label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

.radio-group label {
  display: block;
  margin: 8px 0;
}

input[type="text"], select {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  font-size: 18px;
}

.readonly-input {
  background: #fafafa;
  cursor: pointer;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}

.key {
  padding: 20px;
  font-size: 22px;
  border: none;
  border-radius: 8px;
  background: #ddd;
}

button.submit {
  width: 100%;
  padding: 16px;
  font-size: 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 10px;
}

#message {
  text-align: center;
  margin: 12px 0;
  font-weight: bold;
}

.success { color: green; }
.error { color: red; }

.hidden {
  display: none;
}
</style>
</head>
<body>

<div class="container" id="formScreen">
  <h1>タリーシート</h1>

  <div class="card">
    <label>作成書類</label>
    <div id="documentTypeGroup"></div>
  </div>

  <div class="card">
    <label>品名</label>
    <select id="product"></select>
  </div>

  <div class="card">
    <label>総数</label>
    <input id="total" class="readonly-input" type="text" readonly>
  </div>

  <div class="card" id="breakdownSection">
    <label>端数一覧</label>
    <small>25/20/15/5の形式で入力（端数が無い場合は空欄）</small>
    <input id="breakdown" class="readonly-input" type="text" readonly>
  </div>
  
  <div class="card hidden" id="allSoundSection">

    <label>ALL SOUNDモード</label>

    <label>
      <input type="checkbox" id="allSoundMode">
      ON
    </label>

    <small>
  ①書類通りの入庫数<br>
  ②MS番号が1つのとき<br>
  ③MS番号の数とコンテナの数が一致するとき<br>
  →①＆② または ①＆③
    </small>

  </div>
  
  <div class="card hidden" id="sampleSection">

  <label>
  サンプル用5BAG取得のコンテナの端数
  </label>

  <input
  id="sampleRemainder"
  class="readonly-input"
  type="text"
  readonly>

  </div>

  <div class="card">
    <div id="message"></div>
  </div>

  <div class="card hidden" id="sortModeSection">
    <label>仕分けモード</label>

    <div style="display:flex;align-items:center;gap:12px;">

      <label style="margin:0;">
        <input type="checkbox" id="sortMode">
        ON
      </label>

      <input
        id="sortModeQuantity"
        class="readonly-input"
        type="text"
        readonly
        placeholder="数量"
        style="width:120px;"
      >

    </div>
  </div>

  <div class="card">
    <label>作成者</label>
    <div id="creatorGroup"></div>
  </div>

  <div class="card">
    <label>テンキー</label>
    <div class="keypad" id="keypad"></div>
  </div>

  <button class="submit" onclick="submitForm()">送信</button>
</div>

<div class="container hidden" id="completeScreen">
  <div class="card">
    <h2>送信完了しました</h2>
    <button class="submit" onclick="resetForm()">最初に戻る</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8vULKpdzEHTis41W3I5EbkGt5XQyyz_yZNtoyaE00oiOtH5izLLIFGgGsl0LMFnF/exec";

let master = {};
let creators = [];
let activeInput = "total";

document.getElementById("sortModeQuantity").onclick = () =>
  activeInput = "sortModeQuantity";

document.getElementById("sampleRemainder").onclick = () =>
  activeInput = "sampleRemainder";

document.getElementById("allSoundMode")
  .addEventListener("change", updateVisibleItems);

document.getElementById("product")
  .addEventListener("change", updateVisibleItems);

document.getElementById("total").onclick = () => activeInput = "total";
document.getElementById("sortModeQuantity").onclick = () => activeInput = "sortModeQuantity";

document.getElementById("sampleRemainder").onclick = () => activeInput = "sampleRemainder";
document.getElementById("breakdown").onclick = () => activeInput = "breakdown";

async function init() {
  await loadMaster();
  buildDocumentTypes();
  buildCreators();
  buildKeypad();
  updateVisibleItems();
}

async function loadMaster() {
  const res = await fetch(GAS_URL);
  const data = await res.json();
  master = data.products;
  creators = data.creators;
}

function buildDocumentTypes() {
  const types = ["タリーシート（袋）", "タリーシート（豆）"];
  const container = document.getElementById("documentTypeGroup");

  types.forEach(type => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="radio" name="docType" value="${type}"> ${type}`;
    container.appendChild(label);
  });

  document.querySelectorAll('input[name="docType"]').forEach(el => {
    el.addEventListener("change", updateProducts);
  });
}

function buildCreators() {
  const container = document.getElementById("creatorGroup");
  creators.forEach(name => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="radio" name="creator" value="${name}"> ${name}`;
    container.appendChild(label);
  });
}

function updateProducts() {
  const type = document.querySelector('input[name="docType"]:checked')?.value;
  const select = document.getElementById("product");
  select.innerHTML = "";

  const sortSection = document.getElementById("sortModeSection");
  const allSoundSection = document.getElementById("allSoundSection");

  const sortCheckbox = document.getElementById("sortMode");
  const allSoundCheckbox = document.getElementById("allSoundMode");

  if (type === "タリーシート（袋）") {

    sortSection.classList.remove("hidden");
    allSoundSection.classList.add("hidden");

    allSoundCheckbox.checked = false;

  } else if (type === "タリーシート（豆）") {

    sortSection.classList.add("hidden");
    allSoundSection.classList.remove("hidden");

    sortCheckbox.checked = false;

  } else {

    sortSection.classList.add("hidden");
    allSoundSection.classList.add("hidden");

  }
  if (!type || !master[type]) return;

  master[type].forEach(item => {
    const option = document.createElement("option");
    option.value = item.name;
    option.textContent = item.name;
    select.appendChild(option);
  });

  updateVisibleItems();
  validate();
}
function buildKeypad() {
  const keys = ["7","8","9","4","5","6","1","2","3","0","/","C"];
  const keypad = document.getElementById("keypad");

  keys.forEach(key => {
    const btn = document.createElement("button");
    btn.className = "key";
    btn.textContent = key;
    btn.onclick = () => handleKey(key);
    keypad.appendChild(btn);
  });
}

function handleKey(key) {
  const input = document.getElementById(activeInput);

  if (key === "C") {
    input.value = "";

    updateVisibleItems();
    validate();

    return;
  }

  if (
      (activeInput === "total"
      || activeInput === "sortModeQuantity"
      || activeInput === "sampleRemainder")
      && key === "/"
  ){
      return;
  }

  input.value += key;

  updateVisibleItems();

  validate();
}

function validate() {
  const type = document.querySelector('input[name="docType"]:checked')?.value;
  const productName = document.getElementById("product").value;
  const total = Number(document.getElementById("total").value || 0);
  const breakdownText = document.getElementById("breakdown").value;
  const allSound = document.getElementById("allSoundMode").checked;
  const message = document.getElementById("message");

  if (!type || !productName || !total) {
    message.innerHTML = "";
    return;
  }

  const product = master[type].find(p => p.name === productName);
  if (!product) return;

  const factor = product.factor;

  let breakdownSum = 0;
  if (breakdownText) {
    breakdownSum = breakdownText
      .split("/")
      .filter(Boolean)
      .map(Number)
      .reduce((a,b) => a+b, 0);
  }
  if (allSound) {

    message.innerHTML = "";
    return;

  }
  if ((total - breakdownSum) % factor === 0) {
    message.innerHTML = `<div class="success">数量が一致しました</div>`;
  } else {
    message.innerHTML = `<div class="error">総数及び端数の内容を確認してください</div>`;
  }
}
function updateVisibleItems(){

    const type =
    document.querySelector('input[name="docType"]:checked')?.value;

    const allSound =
    document.getElementById("allSoundMode").checked;

    const product =
    document.getElementById("product").value;

    const total =
    Number(document.getElementById("total").value||0);

    const breakdownCard =
    document.getElementById("breakdownSection");

    const sampleCard =
    document.getElementById("sampleSection");

    if(type!=="タリーシート（豆）"){

        breakdownCard.classList.remove("hidden");
        sampleCard.classList.add("hidden");
        return;

    }

    if(!allSound){

        breakdownCard.classList.remove("hidden");
        sampleCard.classList.add("hidden");
        return;

    }

    const groupA=[
        "エクアドル",
        "ペルー",
        "ペルーNHS"
    ];

    const groupB=[
        "ガーナトレーザブル",
        "ブラジルトメアス",
        "ベネズエラ（スルデラゴ）",
        "ベネズエラ（BX）"
    ];

    if(groupA.includes(product)){

        breakdownCard.classList.add("hidden");

        if(total===362||total===363){

            sampleCard.classList.add("hidden");

        }else{

            sampleCard.classList.remove("hidden");

        }

    }else if(groupB.includes(product)){

        breakdownCard.classList.add("hidden");
        sampleCard.classList.add("hidden");

    }else{

        breakdownCard.classList.remove("hidden");
        sampleCard.classList.add("hidden");

    }

}
async function submitForm() {
  const documentType = document.querySelector('input[name="docType"]:checked')?.value;
  const creator = document.querySelector('input[name="creator"]:checked')?.value;
  const productName = document.getElementById("product").value;
  const total = Number(document.getElementById("total").value);

  if (!documentType) {
    alert("作成書類を選択してください");
    return;
  }

  if (!creator) {
    alert("作成者を選択してください");
    return;
  }

  if (!productName || !total) {
    alert("入力内容を確認してください");
    return;
  }

  const breakdownText = document.getElementById("breakdown").value;
  const sortMode =
    document.getElementById("sortMode")?.checked || false;

  const sortModeQuantity =
    Number(document.getElementById("sortModeQuantity").value || 0);

  const allSoundMode =
    document.getElementById("allSoundMode")?.checked || false;

  const sampleRemainder =
    Number(document.getElementById("sampleRemainder").value || 0);
  
  const breakdown = breakdownText
    ? breakdownText.split("/").filter(Boolean).map(Number)
    : [];

  const sortMode =
    document.getElementById("sortMode")?.checked || false;

  const payload = {

      documentType,

      productName,

      total,

      breakdown,

      creator,

      sortMode,

      sortModeQuantity,

      allSoundMode,

      sampleRemainder

  };

  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const result = await res.json();

  if (!result.success) {
    alert(result.error || "送信に失敗しました");
    return;
  }

  document.getElementById("formScreen").classList.add("hidden");
  document.getElementById("completeScreen").classList.remove("hidden");
}

function resetForm() {
  location.reload();
}

init();
</script>

</body>
</html>
