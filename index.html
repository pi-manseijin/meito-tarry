<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>タリーシート</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

.container {
  max-width: 480px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 12px;
  position: relative;
}

h1 {
  text-align: center;
}

label {
  display: block;
  font-weight: bold;
  margin-bottom: 8px;
}

.radio-group label {
  display: block;
  margin: 8px 0;
}

input[type="text"], select {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  font-size: 18px;
}

.readonly-input {
  background: #fafafa;
  cursor: pointer;
}

.keypad-container {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed #ddd;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.key {
  padding: 18px;
  font-size: 22px;
  border: none;
  border-radius: 8px;
  background: #ddd;
  cursor: pointer;
}

.key-clear {
  background: #f8d7da;
  color: #dc3545;
  font-weight: bold;
}

button.submit {
  width: 100%;
  padding: 16px;
  font-size: 20px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 12px;
}

#message {
  text-align: center;
  margin: 12px 0;
  font-weight: bold;
}

.success { color: green; }
.error { color: red; }

.hidden {
  display: none;
}
</style>
</head>
<body>

<div class="container" id="formScreen">
  <h1>タリーシート</h1>

  <div class="card">
    <label>作成書類</label>
    <div id="documentTypeGroup"></div>
  </div>

  <div class="card hidden" id="allSoundSection">
    <label>ALL SOUNDモード</label>
    <label>
      <input type="checkbox" id="allSoundMode">
      ON
    </label>
    <small>
  ①書類通りの入庫数<br>
  ②MS番号が1つのみ<br>
  ③MS番号の数とコンテナの数が一致する<br>
  →①＆② または ①＆③ の条件を満たすとき
    </small>
  </div>
  
  <div class="card hidden" id="lotCountSection">
    <label>Lot数</label>
    <select id="lotCount">
      <option value="1" selected>1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
    </select>
  </div>
  
  <div class="card">
    <label>品名</label>
    <select id="product"></select>
  </div>

  <div class="card">
    <label>総数</label>
    <input id="total" class="readonly-input" type="text" readonly>
  </div>

  <div class="card" id="breakdownSection">
    <label>端数一覧</label>
    <small>25/20/15/5の形式で入力（端数が無い場合は空欄）</small>
    <input id="breakdown" class="readonly-input" type="text" readonly>
  </div>
  
  <div class="card hidden" id="sampleSection">
    <label>サンプル5BAG取得した方のコンテナの端数</label>
    <small>5BAGは除いて入力</small>
    <input id="sampleRemainder" class="readonly-input" type="text" readonly>
  </div>

  <div class="card" id="messageSection">
      <div id="message"></div>
  </div>

  <div class="card hidden" id="sortModeSection">
    <label>仕分けモード</label>
    <div style="display:flex;align-items:center;gap:12px;">
      <label style="margin:0;">
        <input type="checkbox" id="sortMode">
        ON
      </label>
      <input
        id="sortModeQuantity"
        class="readonly-input"
        type="text"
        readonly
        placeholder="数量"
        style="width:120px;"
      >
    </div>
  </div>

  <div class="card">
    <label>作成者</label>
    <div id="creatorGroup"></div>
  </div>

  <div id="sharedKeypad" class="keypad-container hidden">
    <div class="keypad">
      <button class="key key-clear" onclick="handleKey('C')">C</button>
      <button class="key key-clear" style="grid-column: span 2;" onclick="handleKey('C')">全てクリア</button>
      
      <button class="key" onclick="handleKey('7')">7</button>
      <button class="key" onclick="handleKey('8')">8</button>
      <button class="key" onclick="handleKey('9')">9</button>
      
      <button class="key" onclick="handleKey('4')">4</button>
      <button class="key" onclick="handleKey('5')">5</button>
      <button class="key" onclick="handleKey('6')">6</button>
      
      <button class="key" onclick="handleKey('1')">1</button>
      <button class="key" onclick="handleKey('2')">2</button>
      <button class="key" onclick="handleKey('3')">3</button>
      
      <button class="key" onclick="handleKey('0')">0</button>
      <button class="key" onclick="handleKey('/')">/</button>
      <button class="key" onclick="handleKey('BS')">⌫</button>
    </div>
  </div>

  <button class="submit" onclick="submitForm()">送信</button>
</div>

<div class="container hidden" id="completeScreen">
  <div class="card">
    <h2>送信完了しました</h2>
    <button class="submit" onclick="resetForm()">最初に戻る</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyk8vULKpdzEHTis41W3I5EbkGt5XQyyz_yZNtoyaE00oiOtH5izLLIFGgGsl0LMFnF/exec";

let master = {};
let creators = [];
let activeInput = null;

document.getElementById("total").onclick = (e) => attachKeypad("total", e.target);
document.getElementById("sortModeQuantity").onclick = (e) => attachKeypad("sortModeQuantity", e.target);
document.getElementById("sampleRemainder").onclick = (e) => attachKeypad("sampleRemainder", e.target);
document.getElementById("breakdown").onclick = (e) => attachKeypad("breakdown", e.target);
document.getElementById("lotCount").addEventListener("change", updateVisibleItems);
document.getElementById("allSoundMode").addEventListener("change", updateVisibleItems);
document.getElementById("product").addEventListener("change", updateVisibleItems);

async function init() {
  await loadMaster();
  buildDocumentTypes();
  buildCreators();
  updateVisibleItems();
}

async function loadMaster() {
  const res = await fetch(GAS_URL);
  const data = await res.json();
  master = data.products;
  creators = data.creators;
}

function buildDocumentTypes() {
  const types = ["タリーシート（袋）", "タリーシート（豆）"];
  const container = document.getElementById("documentTypeGroup");

  types.forEach(type => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="radio" name="docType" value="${type}"> ${type}`;
    container.appendChild(label);
  });

  document.querySelectorAll('input[name="docType"]').forEach(el => {
    el.addEventListener("change", updateProducts);
  });
}

function buildCreators() {
  const container = document.getElementById("creatorGroup");
  creators.forEach(name => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="radio" name="creator" value="${name}"> ${name}`;
    container.appendChild(label);
  });
}

function updateProducts() {
  const type = document.querySelector('input[name="docType"]:checked')?.value;
  const select = document.getElementById("product");
  select.innerHTML = "";

  const sortSection = document.getElementById("sortModeSection");
  const allSoundSection = document.getElementById("allSoundSection");
  const lotCountSection = document.getElementById("lotCountSection");

  const sortCheckbox = document.getElementById("sortMode");
  const allSoundCheckbox = document.getElementById("allSoundMode");

  if (type === "タリーシート（袋）") {
    sortSection.classList.remove("hidden");
    allSoundSection.classList.add("hidden");
    lotCountSection.classList.add("hidden");
    allSoundCheckbox.checked = false;
  } else if (type === "タリーシート（豆）") {
    sortSection.classList.add("hidden");
    allSoundSection.classList.remove("hidden");
    sortCheckbox.checked = false;
  } else {
    sortSection.classList.add("hidden");
    allSoundSection.classList.add("hidden");
    lotCountSection.classList.add("hidden");
  }
  
  if (!type || !master[type]) return;

  master[type].forEach(item => {
    const option = document.createElement("option");
    option.value = item.name;
    option.textContent = item.name;
    select.appendChild(option);
  });

  hideKeypad();
  updateVisibleItems();
  validate();
}

function attachKeypad(inputId, inputElement) {
  activeInput = inputId;
  const keypad = document.getElementById("sharedKeypad");
  const card = inputElement.closest(".card");
  if (card) {
    card.appendChild(keypad);
    keypad.classList.remove("hidden");
  }
}

function hideKeypad() {
  const keypad = document.getElementById("sharedKeypad");
  keypad.classList.add("hidden");
  document.body.appendChild(keypad);
  activeInput = null;
}

function handleKey(key) {
  if (!activeInput) return;
  const input = document.getElementById(activeInput);

  if (key === "C") {
    input.value = "";
    updateVisibleItems();
    validate();
    return;
  }

  if (key === "BS") {
    input.value = input.value.slice(0, -1);
    updateVisibleItems();
    validate();
    return;
  }

  if (
      (activeInput === "total"
      || activeInput === "sortModeQuantity"
      || activeInput === "sampleRemainder"
      || activeInput === "lotCount")
      && key === "/"
  ){
      return;
  }

  input.value += key;
  updateVisibleItems();
  validate();
}

/**
 * 2種類のコンテナ目標値（例: 362と363）の組み合わせで、指定された総数が構成できるかを計算し、分解した配列を返す
 */
function findContainerCombination(total, targetA, targetB) {
  const maxB = Math.floor(total / targetB);
  for (let b = 0; b <= maxB; b++) {
    const remaining = total - (b * targetB);
    if (remaining % targetA === 0) {
      const a = remaining / targetA;
      const arr = [];
      for (let i = 0; i < a; i++) arr.push(targetA);
      for (let i = 0; i < b; i++) arr.push(targetB);
      return arr;
    }
  }
  return null;
}

function validate() {
  const type = document.querySelector('input[name="docType"]:checked')?.value;
  const productName = document.getElementById("product").value;
  const total = Number(document.getElementById("total").value || 0);
  const breakdownText = document.getElementById("breakdown").value;
  const allSound = document.getElementById("allSoundMode").checked;
  const lotCountInput = Number(document.getElementById("lotCount").value || 1);
  const sampleRemainderText = document.getElementById("sampleRemainder").value;
  const message = document.getElementById("message");

  if (!type || !productName || !total) {
    message.innerHTML = "";
    return;
  }

  const product = master[type].find(p => p.name === productName);
  if (!product) return;

  const factor = product.factor;

  // ALL SOUNDモードがOFFの場合は従来通りの倍数チェック
  if (!allSound) {
    let breakdownSum = 0;
    if (breakdownText) {
      breakdownSum = breakdownText
        .split("/")
        .filter(Boolean)
        .map(Number)
        .reduce((a,b) => a+b, 0);
    }
    if ((total - breakdownSum) % factor === 0) {
      message.innerHTML = `<div class="success">タリーシートを作成できます</div>`;
    } else {
      message.innerHTML = `<div class="error">この総数及び端数の内容ではタリーシートを作成できません</div>`;
    }
    return;
  }

  // --- 【ALL SOUNDモードON時の厳密な計算ロジック】 ---
  const containerString = String(product.container || "");
  const subtractString = String(product.subtract || "");

  // 1. 総数のコンテナ自動分割判定（E列の値を超えるかチェック）
  let containers = [];
  if (containerString.includes("/")) {
    // GroupA仕様（362/363など）
    const targets = containerString.split("/").map(Number);
    containers = findContainerCombination(total, targets[0], targets[1]);
    if (!containers) {
      message.innerHTML = `<div class="error">総数がコンテナ数量（${containerString}）の組み合わせと一致しません</div>`;
      return;
    }
  } else {
    // 通常品名・ベネズエラ仕様（417単体など）
    const target = Number(containerString);
    if (total % target === 0) {
      const count = total / target;
      for (let i = 0; i < count; i++) containers.push(target);
    } else {
      message.innerHTML = `<div class="error">総数がコンテナ数量（${target}）の倍数になっていません</div>`;
      return;
    }
  }

  // 2. 引算数の配列化（F列が5,5の形式か5単体か）
  const subValues = subtractString ? subtractString.split(",").map(Number) : [];

  // 品名特性の判別
  const isVenezuela = productName.startsWith("ベネズエラ");
  const isGroupA = containerString.includes("/");

  // 3. 各コンテナに引き算を動的適用するシミュレーション
  if (isVenezuela) {
    // ベネズエラ専用ロジック
    if (lotCountInput === 1) {
      // 1Lotの場合：分割されたコンテナのうち1つだけから引算数を2回引く、もう片方は引かない
      if (containers.length < 1) return;
      const c1 = containers[0] - subValues.reduce((a,b)=>a+b, 0);
      let isValid = (c1 % factor === 0);
      for (let i = 1; i < containers.length; i++) {
        if (containers[i] % factor !== 0) isValid = false;
      }
      if (isValid) {
        message.innerHTML = `<div class="success">タリーシートを作成できます（ベネズエラ 1Lot）</div>`;
      } else {
        message.innerHTML = `<div class="error">計算エラー：コンテナの余りが正しくありません</div>`;
      }
    } else if (lotCountInput >= 2) {
      // 2Lot以上の場合：すべてのコンテナから引算数を2回ずつ引く
      let isValid = true;
      const subTotal = subValues.reduce((a,b)=>a+b, 0);
      containers.forEach(c => {
        if ((c - subTotal) % factor !== 0) isValid = false;
      });
      if (isValid) {
        message.innerHTML = `<div class="success">タリーシートを作成できます（ベネズエラ ${lotCountInput}Lot）</div>`;
      } else {
        message.innerHTML = `<div class="error">計算エラー：複数Lotの余りが一致しません</div>`;
      }
    }
  } else if (isGroupA) {
    // GroupA専用ロジック：サンプルコンテナ端数の入力値を用いて引き算コンテナを逆算・検証する
    if (!sampleRemainderText) {
      message.innerHTML = `<div class="error">サンプル5BAG取得コンテナの端数を入力してください</div>`;
      return;
    }
    const enteredRemainder = Number(sampleRemainderText);
    const subVal = subValues[0] || 0; // 通常は単体の「5」

    // どちらのコンテナから引いたかを全検索してシミュレーション検証
    let matchFound = false;
    for (let i = 0; i < containers.length; i++) {
      // 仮にi番目のコンテナから5を引いたと仮定
      const testContainers = [...containers];
      testContainers[i] = testContainers[i] - subVal;

      // その時のi番目の実際の端数（余り）を計算
      const actualRemainder = testContainers[i] % factor;

      // 入力された端数と一致するかチェック
      if (actualRemainder === enteredRemainder) {
        // 一致した場合、他のコンテナも含めてすべてが倍数20（または本来の端数）を維持できているか検証
        let allValid = true;
        testContainers.forEach((c, idx) => {
          if (idx === i) {
            // 引いたコンテナは入力値と一致しているためクリア
          } else {
            // 引いていないコンテナは本来の目標値のまま。すべて端数が本来の仕様（362なら2、363なら3など）に合っているか
            if (c % factor !== (containers[idx] % factor)) allValid = false;
          }
        });
        if (allValid) {
          matchFound = true;
          break;
        }
      }
    }

    if (matchFound) {
      message.innerHTML = `<div class="success">タリーシートを作成できます（サンプル端数検証一致）</div>`;
    } else {
      message.innerHTML = `<div class="error">サンプル端数の入力値が、コンテナ分割ロジックと矛盾しています</div>`;
    }
  } else {
    // その他の通常品名
    message.innerHTML = `<div class="success">タリーシートを作成できます</div>`;
  }
}

function updateVisibleItems(){
    const type = document.querySelector('input[name="docType"]:checked')?.value;
    const allSound = document.getElementById("allSoundMode").checked;
    const product = document.getElementById("product").value;
    const total = Number(document.getElementById("total").value||0);
    const lotCountInput = Number(document.getElementById("lotCount").value || 1); // 追加：現在のLot数

    const breakdownCard = document.getElementById("breakdownSection");
    const sampleCard = document.getElementById("sampleSection");
    const messageCard = document.getElementById("messageSection");
    const lotCountCard = document.getElementById("lotCountSection");

    // タリーシート（豆）以外は従来どおり（袋の処理は完璧なので絶対に触らない）
    if(type!=="タリーシート（豆）"){
        breakdownCard.classList.remove("hidden");
        sampleCard.classList.add("hidden");
        lotCountCard.classList.add("hidden");
        return;
    }

    // ALL SOUNDモードがOFFの場合
    if(!allSound){
        breakdownCard.classList.remove("hidden");
        sampleCard.classList.add("hidden");
        lotCountCard.classList.add("hidden");
        messageCard.classList.remove("hidden");
        return;
    }

    // ALL SOUNDモードがONなら、Lot数カードは必ず表示
    lotCountCard.classList.remove("hidden");

    const groupA=[
        "エクアドル",
        "ペルー",
        "ペルーNHS"
    ];

    const groupB=[
        "ガーナトレーザブル",
        "ブラジルトメアス",
        "ベネズエラ（スルデラゴ）",
        "ベネズエラ（BX）"
    ];

    if(groupA.includes(product)){
        breakdownCard.classList.add("hidden");
        messageCard.classList.add("hidden");

        const currentMaster = master[type]?.find(p => p.name === product);
        let isOverContainerPattern = false; // 総数がマスタ1本の数値を超えている（＝複数コンテナに分割される）か

        if (currentMaster && currentMaster.container) {
            const containerString = String(currentMaster.container);
            if (containerString.indexOf("/") !== -1) {
                // スラッシュがある場合（例: 362/363）
                const patterns = containerString.split("/").map(Number);
                // 総数が362または363の「単発（超えていない）」でなければ、超えていると判定
                if (!patterns.includes(total)) {
                    isOverContainerPattern = true;
                }
            } else {
                // スラッシュがない単一数値の場合
                const pattern = Number(containerString);
                if (total > pattern) {
                    isOverContainerPattern = true;
                }
            }
        }

        // ★修正：Lot数が1 且つ GroupA 且つ 総数がマスタを超えた場合のみ出現
        if(lotCountInput === 1 && isOverContainerPattern){
            sampleCard.classList.remove("hidden");
        } else {
            sampleCard.classList.add("hidden");
        }

    } else if(groupB.includes(product)){
        breakdownCard.classList.add("hidden");
        sampleCard.classList.add("hidden");
        messageCard.classList.add("hidden");

    } else {
        breakdownCard.classList.remove("hidden");
        sampleCard.classList.add("hidden");
        messageCard.classList.add("hidden");
    }
}

async function submitForm() {
  const documentType = document.querySelector('input[name="docType"]:checked')?.value;
  const creator = document.querySelector('input[name="creator"]:checked')?.value;
  const productName = document.getElementById("product").value;
  const total = Number(document.getElementById("total").value);

  if (!documentType) {
    alert("作成書類を選択してください");
    return;
  }

  if (!creator) {
    alert("作成者を選択してください");
    return;
  }

  if (!productName || !total) {
    alert("入力内容を確認してください");
    return;
  }

  const breakdownText = document.getElementById("breakdown").value;
  const sortMode = document.getElementById("sortMode")?.checked || false;
  
  const sortModeQuantity = Number(document.getElementById("sortModeQuantity").value || 0);

  const allSoundMode = document.getElementById("allSoundMode")?.checked || false;
  const lotCount = Number(document.getElementById("lotCount").value || 1);
  const sampleContainerRemainder = document.getElementById("sampleRemainder").value || "";
  
  const breakdown = breakdownText
    ? breakdownText.split("/").filter(Boolean).map(Number)
    : [];

  const payload = {
      documentType,
      productName,
      total,
      breakdown,
      creator,
      sortMode,
      sortModeQuantity, 
      allSoundMode,
      lotCount,
      sampleContainerRemainder
  };

  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const result = await res.json();

  if (!result.success) {
    alert(result.error || "送信に失敗しました");
    return;
  }

  document.getElementById("formScreen").classList.add("hidden");
  document.getElementById("completeScreen").classList.remove("hidden");
}

function resetForm() {
  location.reload();
}

init();
</script>

</body>
</html>
